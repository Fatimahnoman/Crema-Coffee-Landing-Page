<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>How to Train Your AI — A Zoo Keeper's Guide</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --green-900:#1a3c2a;--green-700:#2d6a4f;--green-500:#40916c;--green-300:#74c69d;--green-100:#d8f3dc;--green-50:#edfaf0;
    --gold:#f4a236;--gold-light:#fef3c7;--brown:#8b5e34;--cream:#fdfbf7;--gray-900:#1a1a2e;--gray-700:#3a3a50;--gray-500:#6b6b80;--gray-300:#c0c0cc;--white:#fff;
    --shadow:0 4px 24px rgba(0,0,0,0.06);--shadow-lg:0 12px 48px rgba(0,0,0,0.1);--radius:16px;--radius-sm:10px;
    --sidebar-w:280px;--header-h:64px;
  }
  html{scroll-behavior:smooth}
  body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--cream);color:var(--gray-900);line-height:1.7;font-size:16px;
    display:flex;min-height:100vh;
  }

  /* ─── SIDEBAR ─── */
  .sidebar{
    position:fixed;top:0;left:0;bottom:0;width:var(--sidebar-w);background:var(--green-900);color:var(--white);z-index:100;
    display:flex;flex-direction:column;overflow:hidden;transition:transform .3s;
  }
  .sidebar-header{
    padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,0.08);flex-shrink:0;
  }
  .sidebar-header h2{font-family:'Playfair Display',serif;font-size:1.05rem;line-height:1.3;color:var(--gold);}
  .sidebar-header p{font-size:0.7rem;opacity:0.5;text-transform:uppercase;letter-spacing:1px;margin-top:4px;}
  .sidebar-nav{flex:1;overflow-y:auto;padding:8px 0;}
  .sidebar-nav a{
    display:flex;align-items:center;gap:10px;padding:11px 20px;color:rgba(255,255,255,0.7);text-decoration:none;font-size:0.88rem;font-weight:500;
    transition:all .15s;border-left:3px solid transparent;cursor:pointer;
  }
  .sidebar-nav a:hover{background:rgba(255,255,255,0.06);color:var(--white);}
  .sidebar-nav a.active{background:rgba(255,255,255,0.1);color:var(--gold);border-left-color:var(--gold);font-weight:600;}
  .sidebar-nav a .icon{font-size:1rem;width:22px;text-align:center;flex-shrink:0;}
  .sidebar-nav .divider{
    height:1px;background:rgba(255,255,255,0.06);margin:8px 20px;
  }
  .sidebar-nav .section-label{
    font-size:0.65rem;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,255,255,0.25);padding:16px 20px 6px;font-weight:600;
  }

  /* ─── SIDEBAR TOGGLE ─── */
  .sidebar-toggle{
    display:none;position:fixed;top:12px;left:12px;z-index:200;
    background:var(--green-700);color:var(--white);border:none;width:40px;height:40px;border-radius:10px;
    font-size:1.2rem;cursor:pointer;box-shadow:var(--shadow-lg);
  }
  .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:99;}

  /* ─── MAIN ─── */
  .main{
    margin-left:var(--sidebar-w);flex:1;min-height:100vh;display:flex;flex-direction:column;transition:margin-left .3s;
  }
  .main-header{
    position:sticky;top:0;z-index:50;background:rgba(253,251,247,0.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    border-bottom:1px solid rgba(0,0,0,0.05);padding:0 32px;height:var(--header-h);display:flex;align-items:center;justify-content:space-between;
  }
  .main-header .breadcrumb{font-size:0.8rem;color:var(--gray-500);}
  .main-header .breadcrumb span{color:var(--gray-900);font-weight:600;}
  .main-header .progress{font-size:0.78rem;color:var(--gray-500);background:var(--green-100);padding:4px 14px;border-radius:50px;font-weight:500;}

  .content{
    flex:1;padding:40px 48px 32px;max-width:840px;margin:0 auto;width:100%;
  }

  /* ─── FOOTER NAV ─── */
  .nav-buttons{
    display:flex;justify-content:space-between;gap:16px;padding:32px 0 16px;border-top:1px solid var(--green-100);margin-top:32px;
  }
  .nav-btn{
    display:inline-flex;align-items:center;gap:8px;padding:12px 28px;border-radius:50px;font-size:0.9rem;font-weight:600;cursor:pointer;transition:all .2s;border:none;text-decoration:none;
  }
  .nav-btn.prev{background:var(--white);color:var(--gray-700);box-shadow:var(--shadow);border:1px solid rgba(0,0,0,0.06);}
  .nav-btn.prev:hover{background:var(--green-50);border-color:var(--green-300);}
  .nav-btn.next{background:var(--green-700);color:var(--white);box-shadow:0 4px 16px rgba(45,106,79,0.3);}
  .nav-btn.next:hover{background:var(--green-900);transform:translateY(-1px);}
  .nav-btn:disabled{opacity:0.35;cursor:not-allowed;transform:none!important;}
  .nav-btn .arrow{font-size:1.1rem;}

  /* ─── CONTENT STYLES (same as before, scoped) ─── */
  .page h2{
    font-family:'Playfair Display',serif;font-size:clamp(1.4rem,3vw,2rem);font-weight:800;color:var(--green-900);margin-bottom:8px;
  }
  .page .ch-tag{
    display:inline-block;background:var(--green-500);color:var(--white);font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;
    padding:4px 14px;border-radius:50px;margin-bottom:12px;
  }
  .page h3{font-size:1.2rem;font-weight:700;color:var(--green-700);margin:28px 0 10px;}
  .page h4{font-size:1.02rem;font-weight:600;color:var(--gray-700);margin:20px 0 8px;}
  .page p{margin-bottom:14px;}
  .page ul,.page ol{margin:10px 0 14px 22px;}
  .page li{margin-bottom:5px;}
  .page strong{color:var(--gray-900);}
  .page .card{background:var(--white);border-radius:var(--radius);padding:24px 28px;margin:16px 0;box-shadow:var(--shadow);border:1px solid rgba(0,0,0,0.04);}
  .page .card-green{background:var(--green-50);border-left:4px solid var(--green-500);}
  .page .card-gold{background:var(--gold-light);border-left:4px solid var(--gold);}
  .page .table-wrap{overflow-x:auto;margin:16px 0;border-radius:var(--radius-sm);box-shadow:var(--shadow);}
  .page table{width:100%;border-collapse:collapse;background:var(--white);font-size:0.9rem;}
  .page thead{background:var(--green-700);color:var(--white);}
  .page th{padding:12px 16px;text-align:left;font-weight:600;font-size:0.78rem;text-transform:uppercase;letter-spacing:.5px;}
  .page td{padding:10px 14px;border-bottom:1px solid var(--green-100);}
  .page tbody tr:hover{background:var(--green-50);}
  .page .tree{background:var(--green-900);color:var(--green-100);border-radius:var(--radius);padding:20px 24px;font-family:'Courier New',monospace;font-size:0.82rem;line-height:1.7;margin:16px 0;overflow-x:auto;white-space:pre;}
  .page pre{background:var(--gray-900);color:#e4e4ec;border-radius:var(--radius-sm);padding:16px 20px;overflow-x:auto;font-size:0.85rem;line-height:1.6;margin:14px 0;font-family:'Courier New',monospace;}
  .page code{background:var(--green-100);color:var(--green-900);padding:2px 8px;border-radius:4px;font-size:0.85em;font-family:'Courier New',monospace;}
  .page .mistake-callout{background:#fef2f2;border:1px solid #fecaca;border-radius:var(--radius-sm);padding:18px 22px;margin:16px 0;}
  .page .mistake-callout .quote{font-style:italic;color:var(--gray-700);padding-left:14px;border-left:3px solid #f87171;margin-bottom:6px;}
  .page .mistake-callout .correction{color:#dc2626;font-weight:600;}
  .page .inline-q{background:var(--gold-light);border-radius:var(--radius-sm);padding:14px 18px;margin:10px 0;}
  .page .inline-q .answer{color:var(--green-700);font-weight:600;}
  .page .mistake-list{counter-reset:mistake;}
  .page .mistake-item{background:var(--white);border-radius:var(--radius-sm);padding:18px 22px;margin:10px 0;box-shadow:var(--shadow);border-left:4px solid var(--gold);counter-increment:mistake;}
  .page .mistake-item h4{margin:0 0 6px;font-size:0.98rem;}
  .page .mistake-item h4::before{content:"#" counter(mistake) " ";color:var(--gold);font-weight:800;}
  .page .mistake-item .truth{color:var(--green-700);font-weight:600;}
  .page blockquote{background:var(--green-50);border-left:4px solid var(--green-500);padding:14px 20px;margin:14px 0;border-radius:0 var(--radius-sm) var(--radius-sm) 0;font-size:0.93rem;color:var(--gray-700);}

  /* ─── FLASHCARDS ─── */
  .flashcard-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin:16px 0;}
  .flashcard{background:var(--white);border-radius:var(--radius-sm);box-shadow:var(--shadow);cursor:pointer;transition:transform .2s,box-shadow .2s;perspective:800px;height:170px;}
  .flashcard:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);}
  .flashcard-inner{position:relative;width:100%;height:100%;transition:transform .5s ease;transform-style:preserve-3d;}
  .flashcard.flipped .flashcard-inner{transform:rotateY(180deg);}
  .flashcard-front,.flashcard-back{position:absolute;inset:0;border-radius:var(--radius-sm);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px;text-align:center;backface-visibility:hidden;border:1px solid rgba(0,0,0,0.04);}
  .flashcard-front{background:var(--green-700);color:var(--white);}
  .flashcard-front strong{font-size:1rem;display:block;margin-bottom:6px;}
  .flashcard-front .tap-hint{font-size:0.65rem;opacity:0.5;text-transform:uppercase;letter-spacing:1px;}
  .flashcard-back{background:var(--white);color:var(--gray-900);transform:rotateY(180deg);font-size:0.88rem;line-height:1.5;}

  /* ─── QUIZ ─── */
  .quiz-item{background:var(--white);border-radius:var(--radius-sm);padding:20px 24px;margin:14px 0;box-shadow:var(--shadow);}
  .quiz-item h4{margin:0 0 10px;font-size:1rem;}
  .quiz-item .options{margin:6px 0 10px;}
  .quiz-item .options div{padding:3px 0;font-size:0.92rem;}
  .quiz-item .options{margin:6px 0 10px;}
  .quiz-item .option-row{
    display:flex;align-items:center;gap:10px;padding:10px 14px;margin:6px 0;border-radius:var(--radius-sm);
    border:2px solid var(--green-100);cursor:pointer;transition:all .15s;user-select:none;
  }
  .quiz-item .option-row:hover{border-color:var(--green-300);background:var(--green-50);}
  .quiz-item .option-row.selected{border-color:var(--green-500);background:var(--green-100);}
  .quiz-item .option-row.correct{border-color:#10b981;background:#d1fae5;}
  .quiz-item .option-row.wrong{border-color:#ef4444;background:#fef2f2;}
  .quiz-item .option-row .box{
    width:22px;height:22px;border-radius:50%;border:2px solid var(--green-300);display:flex;align-items:center;justify-content:center;
    flex-shrink:0;transition:all .15s;font-size:0.7rem;font-weight:700;color:transparent;
  }
  .quiz-item .option-row.selected .box{border-color:var(--green-500);background:var(--green-500);color:var(--white);}
  .quiz-item .option-row.correct .box{border-color:#10b981;background:#10b981;color:var(--white);}
  .quiz-item .option-row.wrong .box{border-color:#ef4444;background:#ef4444;color:var(--white);}
  .quiz-item .option-row .letter{font-weight:600;color:var(--gray-700);}
  .quiz-item .option-row .text{font-size:0.92rem;}
  .quiz-feedback{margin-top:10px;padding:12px 16px;border-radius:var(--radius-sm);font-size:0.9rem;display:none;}
  .quiz-feedback.show{display:block;}
  .quiz-feedback.correct{background:#d1fae5;border-left:3px solid #10b981;}
  .quiz-feedback.wrong{background:#fef2f2;border-left:3px solid #ef4444;}
  .quiz-check-btn{background:var(--green-500);color:var(--white);border:none;padding:8px 24px;border-radius:50px;font-size:0.82rem;font-weight:600;cursor:pointer;transition:all .2s;margin-top:8px;}
  .quiz-check-btn:hover{background:var(--green-700);}
  .quiz-check-btn:disabled{opacity:0.4;cursor:not-allowed;}

  /* ─── STUDY PLAN ─── */
  .study-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin:16px 0;}
  .study-day{background:var(--white);border-radius:var(--radius-sm);padding:18px 22px;box-shadow:var(--shadow);border-top:4px solid var(--green-500);}
  .study-day .day-label{font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--green-500);}
  .study-day h4{margin:3px 0 6px;font-size:1.05rem;color:var(--green-900);}
  .study-day .time{display:inline-block;background:var(--green-100);color:var(--green-700);font-size:0.72rem;font-weight:600;padding:2px 10px;border-radius:50px;margin-bottom:6px;}
  .study-day p{font-size:0.88rem;margin:3px 0;}
  .study-day .checkpoint{margin-top:8px;padding:8px 12px;background:var(--gold-light);border-radius:8px;font-size:0.83rem;border-left:3px solid var(--gold);}
  .study-day .checkpoint strong{color:var(--brown);}
  .page .bonus{background:linear-gradient(135deg,#fffbeb,#fef3c7);border:1px solid #fcd34d;border-radius:var(--radius-sm);padding:18px 22px;margin:16px 0;text-align:center;}
  .page .bonus h4{color:#92400e;margin-top:0;}

  /* ─── HOMEPAGE ─── */
  .homepage{text-align:center;padding:40px 0 20px;}
  .homepage .hero-mini{
    background:linear-gradient(135deg,var(--green-900),var(--green-700));color:var(--white);border-radius:var(--radius);
    padding:60px 40px 48px;margin-bottom:32px;position:relative;overflow:hidden;
  }
  .homepage .hero-mini::before{
    content:'';position:absolute;inset:0;
    background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");opacity:0.3;
  }
  .homepage .hero-mini *{position:relative;z-index:1;}
  .homepage .hero-mini .badge{display:inline-block;background:var(--gold);color:var(--green-900);font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;padding:5px 14px;border-radius:50px;margin-bottom:16px;}
  .homepage .hero-mini h1{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,4vw,2.8rem);font-weight:800;line-height:1.2;margin-bottom:12px;}
  .homepage .hero-mini h1 span{color:var(--gold);}
  .homepage .hero-mini p{font-size:1rem;opacity:0.85;max-width:520px;margin:0 auto 24px;font-weight:300;}
  .homepage .start-btn{
    display:inline-flex;align-items:center;gap:10px;background:var(--gold);color:var(--green-900);padding:14px 36px;border-radius:50px;
    font-size:1rem;font-weight:700;border:none;cursor:pointer;transition:all .2s;box-shadow:0 4px 20px rgba(244,162,54,0.35);
  }
  .homepage .start-btn:hover{transform:translateY(-2px);box-shadow:0 6px 28px rgba(244,162,54,0.45);}
  .homepage .stats{display:flex;gap:24px;justify-content:center;flex-wrap:wrap;margin-bottom:32px;}
  .homepage .stat-card{background:var(--white);border-radius:var(--radius);padding:20px 28px;box-shadow:var(--shadow);flex:1;min-width:120px;max-width:180px;}
  .homepage .stat-card .num{font-size:1.8rem;font-weight:800;color:var(--green-700);}
  .homepage .stat-card .label{font-size:0.78rem;color:var(--gray-500);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}
  .homepage .what-youll-learn{text-align:left;max-width:560px;margin:0 auto;}
  .homepage .what-youll-learn h3{text-align:center;margin-bottom:16px;}
  .homepage .what-youll-learn li{padding:6px 0;font-size:0.95rem;}

  /* ─── RESPONSIVE ─── */
  @media(max-width:820px){
    .sidebar{transform:translateX(-100%);}
    .sidebar.open{transform:translateX(0);}
    .sidebar-overlay.show{display:block;}
    .sidebar-toggle{display:flex;align-items:center;justify-content:center;}
    .main{margin-left:0;}
    .content{padding:24px 20px 32px;}
    .main-header{padding:0 16px 0 60px;}
    .nav-buttons{flex-direction:column;gap:10px;}
    .nav-btn{justify-content:center;}
  }
  @media(max-width:480px){
    .homepage .hero-mini{padding:36px 20px 32px;}
    .homepage .stats{gap:12px;}
    .homepage .stat-card{padding:14px 20px;min-width:80px;}
    .flashcard-grid{grid-template-columns:1fr;}
    .study-grid{grid-template-columns:1fr;}
  }

  /* ─── SCROLLBAR ─── */
  .sidebar-nav::-webkit-scrollbar{width:4px;}
  .sidebar-nav::-webkit-scrollbar-track{background:transparent;}
  .sidebar-nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:4px;}
</style>
</head>

<button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle menu">☰</button>

<!-- ═══ SIDEBAR ═══ -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h2>How to Train Your AI</h2>
    <p>A Zoo Keeper's Guide</p>
  </div>
  <nav class="sidebar-nav" id="sidebarNav">
    <div class="section-label">Home</div>
    <a data-page="home" class="active"><span class="icon">🏠</span> Home</a>
    <div class="divider"></div>
    <div class="section-label">Chapters</div>
    <a data-page="ch1"><span class="icon">🐾</span> Welcome to the Zoo</a>
    <a data-page="ch2"><span class="icon">🤖</span> What is AI?</a>
    <a data-page="ch3"><span class="icon">📊</span> What is ML?</a>

<script>
// ═══════════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════════

const pages = [
  { id:'home', label:'Home', icon:'🏠' },
  { id:'ch1', label:'Welcome to the Zoo', icon:'🐾' },
  { id:'ch2', label:'What is AI?', icon:'🤖' },
  { id:'ch3', label:'What is Machine Learning?', icon:'📊' },
  { id:'ch4', label:'What is Deep Learning?', icon:'🐙' },
  { id:'ch5', label:'The Complete Family Tree', icon:'🌳' },
  { id:'ch6', label:'Common Mistakes', icon:'⚠️' },
  { id:'ref', label:'Quick Reference', icon:'📋' },
  { id:'flashcards', label:'Flashcards', icon:'🃏' },
  { id:'quiz', label:'Chapter Quiz', icon:'🧠' },
  { id:'study', label:'7-Day Study Plan', icon:'📅' },
  { id:'takeaways', label:'Key Takeaways', icon:'🎯' },
];

const pageContent = {};

// ─── FLASHCARD DATA ───
const flashcards = [
  { front:"AI", back:"Any machine that performs tasks needing human intelligence. The whole zoo." },
  { front:"Machine Learning", back:"A type of AI where the computer learns patterns from data instead of following fixed rules. Training the animals." },
  { front:"Deep Learning", back:"A type of ML using neural networks with many layers. The octopus brain." },
  { front:"Supervised Learning", back:"ML with labeled examples. Like teaching a parrot with an answer key." },
  { front:"Unsupervised Learning", back:"ML finding patterns in unlabeled data. Like monkeys grouping objects naturally." },
  { front:"Reinforcement Learning", back:"ML learning through trial and error with rewards. Like training a dolphin with fish treats." },
  { front:"Is all Deep Learning also Machine Learning?", back:"Yes." },
  { front:"Is all Machine Learning also Deep Learning?", back:"No." },
  { front:"Neural Network", back:'A system of connected "neurons" (simple math units) that process information in layers. The octopus\'s arms.' },
  { front:"Training Data", back:"The examples you give an ML model to learn from. The fruit you show the parrot." },
  { front:"Overfitting", back:"When a model learns the training data too perfectly, including noise. Like a parrot that only recognizes YOUR apple, not apples in general. (Ch 6)" },
  { front:"Underfitting", back:"When a model fails to learn the pattern at all. Like a dolphin that never figures out the trick. (Ch 6)" },

// APP STATE

let currentPage = 'home';

// ═══════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════

function navigate(pageId) {
  currentPage = pageId;
  const content = document.getElementById('content');
  const html = pageContent[pageId];
  if (!html) return;

  content.innerHTML = html;

  // Update active nav link
  document.querySelectorAll('.sidebar-nav a').forEach(a => {
    a.classList.toggle('active', a.dataset.page === pageId);
  });

  // Update breadcrumb
  const page = pages.find(p => p.id === pageId);
  document.getElementById('breadcrumb').innerHTML = `${page.icon} <span>${page.label}</span>`;

  // Update progress
  const idx = pages.findIndex(p => p.id === pageId);
  document.getElementById('progress').textContent = `${idx} / ${pages.length - 1}`;

  // Render interactive widgets
  if (pageId === 'flashcards') renderFlashcards();
    if (pageId === 'quiz') { renderQuiz(); }
  if (pageId === 'study') renderStudyPlan();

  // Close sidebar on mobile
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('show');

  // Scroll to top
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ─── NEXT / PREV NAV ───
function getPrevPage(pageId) {
  const idx = pages.findIndex(p => p.id === pageId);
  return idx > 0 ? pages[idx - 1].id : null;
}
function getNextPage(pageId) {
  const idx = pages.findIndex(p => p.id === pageId);
  return idx < pages.length - 1 ? pages[idx + 1].id : null;
}

function navPrev() {
  const prev = getPrevPage(currentPage);
  if (prev) navigate(prev);
}
function navNext() {
  const next = getNextPage(currentPage);
  if (next) navigate(next);
}

// ─── RENDER PAGES WITH NAV ───
const origRender = {};

function wrapWithNav(html, pageId) {
  const prev = getPrevPage(pageId);
  const next = getNextPage(pageId);
  return html + `
    <div class="nav-buttons">
      ${prev ? `<button class="nav-btn prev" onclick="navPrev()"><span class="arrow">←</span> ${pages.find(p=>p.id===prev).label}</button>` : '<div></div>'}
      ${next ? `<button class="nav-btn next" onclick="navNext()">${pages.find(p=>p.id===next).label} <span class="arrow">→</span></button>` : '<div></div>'}
    </div>
  `;
}

// Override navigate to wrap content
const _origNavigate = navigate;
navigate = function(pageId) {
  currentPage = pageId;
  const content = document.getElementById('content');
  let raw = pageContent[pageId];
  if (!raw) return;

  // Don't wrap home in nav buttons
  const wrapped = pageId === 'home' ? raw : wrapWithNav(raw, pageId);
  content.innerHTML = wrapped;

  document.querySelectorAll('.sidebar-nav a').forEach(a => {
    a.classList.toggle('active', a.dataset.page === pageId);
  });
  const page = pages.find(p => p.id === pageId);
  document.getElementById('breadcrumb').innerHTML = `${page.icon} <span>${page.label}</span>`;
  const idx = pages.findIndex(p => p.id === pageId);
  document.getElementById('progress').textContent = `${idx} / ${pages.length - 1}`;

  if (pageId === 'flashcards') renderFlashcards();
    if (pageId === 'quiz') { renderQuiz(); }
  if (pageId === 'study') renderStudyPlan();

  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('show');
  window.scrollTo({ top: 0, behavior: 'smooth' });
};

// ═══════════════════════════════════════════════════════════
// RENDERERS
// ═══════════════════════════════════════════════════════════

function renderFlashcards() {
  const container = document.getElementById('flashcardContainer');
  if (!container) return;
  container.innerHTML = '';
  flashcards.forEach(card => {
    const div = document.createElement('div'); div.className = 'flashcard';
    div.innerHTML = `
      <div class="flashcard-inner">
        <div class="flashcard-front"><strong>${card.front}</strong><span class="tap-hint">tap to flip</span></div>
        <div class="flashcard-back">${card.back}</div>
      </div>
    `;
    div.addEventListener('click', () => div.classList.toggle('flipped'));
    container.appendChild(div);
  });
}

function renderQuiz() {
  const container = document.getElementById('quizContainer');
  if (!container) return;
  container.innerHTML = '';
  const labels = ['A','B','C','D'];
  quizData.forEach((item, i) => {
    const div = document.createElement('div'); div.className = 'quiz-item';
    div.innerHTML = `
      <h4>Question ${i+1}</h4>
      <p>${item.q}</p>
      <div class="options" id="q-opts-${i}">
        ${item.opts.map((opt,j) => `
          <div class="option-row" data-q="${i}" data-idx="${j}" onclick="selectOption(this)">
            <div class="box">✓</div>
            <span class="letter">${labels[j]}.</span>
            <span class="text">${opt}</span>
          </div>
        `).join('')}
      </div>
      <button class="quiz-check-btn" id="q-check-${i}" onclick="checkAnswer(${i})" disabled>Check Answer</button>
      <div class="quiz-feedback" id="q-fb-${i}"></div>
    `;
    container.appendChild(div);
  });
}

function selectOption(el) {
  const qIdx = el.dataset.q;
  const container = el.closest('.options');
  // Deselect all others in this question
  container.querySelectorAll('.option-row').forEach(r => r.classList.remove('selected'));
  el.classList.add('selected');
  // Enable check button
  document.getElementById(`q-check-${qIdx}`).disabled = false;
}

function checkAnswer(qIdx) {
  const selected = document.querySelector(`#q-opts-${qIdx} .option-row.selected`);
  if (!selected) return;
  const chosen = parseInt(selected.dataset.idx);
  const item = quizData[qIdx];
  const correct = chosen === item.correct;
  const fb = document.getElementById(`q-fb-${qIdx}`);
  const btn = document.getElementById(`q-check-${qIdx}`);

  // Mark all rows
  document.querySelectorAll(`#q-opts-${qIdx} .option-row`).forEach((r, idx) => {
    if (idx === item.correct) r.classList.add('correct');
    else if (idx === chosen && !correct) r.classList.add('wrong');
  });

  fb.className = `quiz-feedback show ${correct ? 'correct' : 'wrong'}`;
  fb.innerHTML = correct
    ? `<strong>✓ Correct!</strong> ${item.ans}`
    : `<strong>✗ Not quite.</strong> ${item.ans}`;
  btn.disabled = true;
  btn.textContent = 'Answered ✓';
}

function renderStudyPlan() {
  const grid = document.getElementById('studyGrid');
  if (!grid) return;
  const plan = [
    { day:"Day 1", topic:"What is AI?", time:"20 min", act:"Read Ch 2. Find 3 AIs you use daily.", chk:"Name 3 examples of AI in under 30 seconds." },
    { day:"Day 2", topic:"Machine Learning", time:"30 min", act:"Read Ch 3. Write down the 3 types of ML.", chk:"Recite the 3 types + give one real example of each." },
    { day:"Day 3", topic:"Deep Learning", time:"30 min", act:"Read Ch 4. Draw the octopus analogy.", chk:'Explain: "Deep learning is different from regular ML because..."' },
    { day:"Day 4", topic:"Family Tree", time:"20 min", act:"Read Ch 5. Draw the tree from memory.", chk:"Draw DL ⊂ ML ⊂ AI blind, with examples." },
    { day:"Day 5", topic:"Common Mistakes", time:"15 min", act:"Read Ch 6. Pick your top 3 mistakes.", chk:"Find a real article making each mistake. Spot errors!" },
    { day:"Day 6", topic:"Review + Flashcards", time:"25 min", act:'Sort 20 flashcards into piles.', chk:"18/20 correct without hesitation." },
    { day:"Day 7", topic:"Quiz + Self-Test", time:"25 min", act:"Take Quiz. Re-read wrong answers.", chk:"Cover Quick Reference. Recite all 11 concepts. Pass = 9/11." },
  ];
  grid.innerHTML = plan.map(p => `
    <div class="study-day">
      <div class="day-label">${p.day}</div>
      <h4>${p.topic}</h4>
      <span class="time">${p.time}</span>
      <p>${p.act}</p>
      <div class="checkpoint"><strong>Checkpoint:</strong> ${p.chk}</div>
    </div>
  `).join('');
}

// ═══════════════════════════════════════════════════════════
// SIDEBAR / MOBILE
// ═══════════════════════════════════════════════════════════

document.getElementById('sidebarToggle').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('show');
});
document.getElementById('sidebarOverlay').addEventListener('click', () => {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('show');
});

// Sidebar nav clicks
document.querySelectorAll('.sidebar-nav a').forEach(a => {
  a.addEventListener('click', () => navigate(a.dataset.page));
});

// ─── KEYBOARD SHORTCUTS ───
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') { navNext(); e.preventDefault(); }
  if (e.key === 'ArrowLeft') { navPrev(); e.preventDefault(); }
});

// ═══════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════

navigate('home');
</script>
